name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget \
            build-essential ccache \
            libffi-dev libssl-dev \
            libltdl-dev libbz2-dev \
            zlib1g-dev libncurses5-dev \
            libsqlite3-dev \
            autoconf automake libtool \
            pkg-config cmake

      - name: Install Python packages
        run: |
          pip install --upgrade pip wheel setuptools
          pip install cython==0.29.33
          pip install buildozer==1.5.0

      - name: Verify installations
        run: |
          python --version
          java -version
          buildozer --version
          cython --version

      - name: Cache buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build APK
        env:
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
        run: |
          yes | buildozer android debug 2>&1 | tee build.log
          echo "Exit code: $?"

      - name: Check result
        run: |
          echo "=== bin/ folder ==="
          ls -la bin/ 2>/dev/null || echo "ERROR: bin/ folder not found!"
          echo "=== Last 30 lines of log ==="
          tail -30 build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WorkerTracker-APK
          path: bin/*.apk
          retention-days: 30

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-error
          path: build.log
          retention-days: 7
